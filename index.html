<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENGAL TIGER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
header{background:#131921;color:#fff;padding:10px;display:flex;justify-content:space-between}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px}
.product{background:#fff;padding:10px;border-radius:10px;text-align:center}
#cartBox{display:none;position:fixed;right:0;top:0;width:300px;height:100%;background:#fff;padding:10px;overflow:auto}
button{padding:8px;background:#ff9900;border:none;margin:5px;border-radius:5px}
input,textarea{padding:8px;margin:5px;width:90%}
</style>
</head>

<body>

<header>
<h3>🐯 BENGAL TIGER</h3>
<button onclick="toggleCart()">🛒</button>
</header>

<div style="background:#ff9900;text-align:center;padding:8px">
🚚 All India Shipping 🇮🇳
</div>

<!-- ADMIN -->
<div style="padding:10px;background:#fff;margin:10px;border-radius:10px">
<h3>Add Product</h3>
<input id="name" placeholder="Product Name"><br>
<input id="price" placeholder="Price"><br>
<input id="image" type="file"><br>
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
Total ₹<span id="total">0</span><br>

<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Order</button>
</div>

<script>

// 🔥 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const storage=firebase.storage();

// ADD PRODUCT
function addProduct(){
let file=image.files[0];
let ref=storage.ref("products/"+file.name);

ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.collection("products").add({
name:name.value,
price:price.value,
image:url
});
});
});
}

// LOAD PRODUCTS
db.collection("products").onSnapshot(s=>{
products.innerHTML="";
s.forEach(doc=>{
let p=doc.data();
products.innerHTML+=`
<div class="product">
<img src="${p.image}" width="100%">
<h4>${p.name}</h4>
₹${p.price}<br>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
});
});

// CART
let cart=[],total=0;

function addCart(n,p){
cart.push({name:n,price:p});
total+=Number(p);
cartItems.innerHTML+=`<li>${n} ₹${p}</li>`;
document.getElementById("total").innerText=total;
}

function toggleCart(){
cartBox.style.display=cartBox.style.display==="block"?"none":"block";
}

// ORDER
function placeOrder(){
if(!phone.value||!address.value)return alert("Fill details");

let msg="Order%0A";
cart.forEach(i=>msg+=i.name+" ₹"+i.price+"%0A");
msg+="Total ₹"+total;

window.open("https://wa.me/917810049030?text="+msg);
}

</script>

</body>
</html>
