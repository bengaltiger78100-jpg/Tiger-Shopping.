<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENGAL TIGER</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
#login{background:#fff;padding:25px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.2);text-align:center;width:300px}
.logo{width:120px}

.brand{
font-weight:bold;
color:#ff9900;
text-shadow:0 0 10px #ff9900,0 0 20px #ff6600;
}

header{background:#131921;color:#fff;padding:12px;display:flex;justify-content:space-between}

#shipping{background:#ff9900;color:#000;text-align:center;padding:8px;font-weight:bold}

.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:10px}
.product{background:#fff;padding:10px;border-radius:10px;text-align:center}

#cartBox{display:none;position:fixed;right:0;top:0;width:300px;height:100%;background:#fff;padding:10px;overflow:auto}

button{padding:8px;margin:5px;background:#ff9900;border:none;border-radius:5px}
input,textarea{padding:8px;margin:5px;width:90%}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div id="login">
<h2 class="brand">🐯 BENGAL TIGER</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>
<button onclick="resetPassword()">Forgot Password</button>
<button onclick="googleLogin()">Google Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>
<h3 class="brand">🐯 BENGAL TIGER</h3>
<div>
<button onclick="logout()">Logout</button>
<button onclick="toggleCart()">🛒</button>
</div>
</header>

<div id="shipping">🚚 All India Shipping Available 🇮🇳</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;padding:10px">
<h3>Add Product</h3>
<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="file" type="file">
<button onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="products"></div>

</div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
Total ₹<span id="total">0</span><br>

<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea><br>

<div style="color:red;font-weight:bold;font-size:14px">
❌ No Cancellation<br>
❌ No Return<br>
❌ No Replacement
</div>

<label>
<input type="checkbox" id="agree"> I agree to Terms
</label><br>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let cart=[], total=0;

const ADMINS=[
"bengaltiger78100@gmail.com",
"monthiramoorthi@gmail.com"
];

const ADMIN_PASS="shiva@201328";

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

// RESET
function resetPassword(){
if(!email.value)return alert("Enter email");
auth.sendPasswordResetEmail(email.value);
}

// GOOGLE LOGIN
function googleLogin(){
let provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
if(user){
loginPage.style.display="none";
app.style.display="block";

if(ADMINS.includes(user.email)){
let pass=prompt("Enter admin password");
if(pass===ADMIN_PASS){
adminPanel.style.display="block";
}
}
}
});

// ADD PRODUCT
function addProduct(){
let fileData=file.files[0];
let ref=storage.ref("products/"+fileData.name);

ref.put(fileData).then(()=>{
ref.getDownloadURL().then(url=>{
db.collection("products").add({
name:name.value,
price:price.value,
image:url
});
});
});
}

// LOAD PRODUCTS
db.collection("products").onSnapshot(snapshot=>{
products.innerHTML="";
snapshot.forEach(doc=>{
let p=doc.data();
products.innerHTML+=`
<div class="product">
<img src="${p.image}" width="100%">
<h4>${p.name}</h4>
₹${p.price}<br>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
</div>`;
});
});

// CART
function addCart(n,p){
cart.push({name:n,price:p});
total+=+p;
cartItems.innerHTML+=`<li>${n} ₹${p}</li>`;
document.getElementById("total").innerText=total;
}

function toggleCart(){
cartBox.style.display=cartBox.style.display==="block"?"none":"block";
}

// ORDER
function placeOrder(){

if(!agree.checked)return alert("Accept terms");
if(!phone.value||!address.value)return alert("Fill details");

let user = auth.currentUser;
let email = user ? user.email : "No Email";

let msg="🐯 BENGAL TIGER ORDER%0A%0A";
msg+="Email:"+email+"%0A";
msg+="Phone:"+phone.value+"%0A";
msg+="Address:"+address.value+"%0A%0A";

cart.forEach(i=>{
msg+=i.name+" ₹"+i.price+"%0A";
});

msg+="Total ₹"+total;

// WHATSAPP
window.open("https://wa.me/917810049030?text="+msg);

// SAVE
db.collection("orders").add({
items:cart,
total:total,
email:email,
phone:phone.value,
address:address.value
});

cart=[];
total=0;
cartItems.innerHTML="";
document.getElementById("total").innerText=0;
}

</script>

</body>
  </html>
