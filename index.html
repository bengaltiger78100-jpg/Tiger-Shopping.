<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENGAL TIGER</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}

header{
background:#131921;
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.product{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

#cartBox{
display:none;
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#fff;
padding:10px;
overflow:auto;
}

button{
padding:8px;
background:#ff9900;
border:none;
margin:5px;
border-radius:5px;
}

input,textarea{
padding:8px;
margin:5px;
width:90%;
}

#adminPanel{
padding:10px;
background:#fff;
margin:10px;
border-radius:10px;
}

#loginPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

#loginBox{
background:#fff;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h3>🐯 BENGAL TIGER</h3>
<button onclick="toggleCart()">🛒</button>
</header>

<div style="background:#ff9900;text-align:center;padding:8px">
🚚 All India Shipping 🇮🇳
</div>

<!-- ADMIN ADD PRODUCT -->
<div id="adminPanel">
<h3>Add Product</h3>
<input id="pname" placeholder="Product Name"><br>
<input id="pprice" placeholder="Price"><br>
<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div id="cartBox">
<h3>Cart</h3>
<ul id="cartItems"></ul>
Total ₹<span id="total">0</span><br>

<input id="phone" placeholder="Phone"><br>
<textarea id="address" placeholder="Address"></textarea>

<div style="color:red">
❌ No Return<br>
❌ No Cancellation<br>
❌ No Replacement
</div>

<button onclick="checkLogin()">Place Order</button>
</div>

<!-- LOGIN -->
<div id="loginPopup">
<div id="loginBox">
<h3>Login Required</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<script>

// CART
let cart=[], total=0;

// ADD PRODUCT (ADMIN)
function addProduct(){
let name=document.getElementById("pname").value;
let price=document.getElementById("pprice").value;

if(!name || !price){
alert("Enter details");
return;
}

document.getElementById("products").innerHTML+=`
<div class="product">
<h4>${name}</h4>
₹${price}<br>
<button onclick="addCart('${name}',${price})">Add</button>
</div>`;

}

// CART
function addCart(n,p){
cart.push({name:n,price:p});
total+=Number(p);

cartItems.innerHTML+=`<li>${n} ₹${p}</li>`;
document.getElementById("total").innerText=total;
}

function toggleCart(){
cartBox.style.display=cartBox.style.display==="block"?"none":"block";
}

// LOGIN
let loggedIn=false;

function checkLogin(){
if(!loggedIn){
loginPopup.style.display="flex";
}else{
placeOrder();
}
}

function login(){
if(email.value && password.value){
loggedIn=true;
loginPopup.style.display="none";
placeOrder();
}else{
alert("Enter login");
}
}

// ORDER
function placeOrder(){

if(!phone.value||!address.value){
alert("Fill details");
return;
}

let msg="🐯 BENGAL TIGER ORDER%0A";
msg+="Phone:"+phone.value+"%0A";
msg+="Address:"+address.value+"%0A";

cart.forEach(i=>{
msg+=i.name+" ₹"+i.price+"%0A";
});

msg+="Total ₹"+total;

window.open("https://wa.me/917810049030?text="+msg);
}

</script>

</body>
  </html>
